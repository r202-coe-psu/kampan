<!DOCTYPE html>
<html lang="th" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ขอบคุณสำหรับการประเมิน</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap">
  <style>
    body {
      font-family: 'Noto Sans Thai', sans-serif;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-sky-50 to-blue-100 min-h-screen flex items-center justify-center p-4">
  <div class="card bg-base-100 shadow-2xl w-full max-w-sm text-center">
    <div class="card-body items-center gap-4 py-10">

      <div class="flex items-center justify-center w-20 h-20 rounded-full bg-success/10 text-success text-5xl">
        ✅
      </div>

      <h1 class="card-title text-2xl font-bold text-sky-700">ขอบคุณสำหรับการประเมิน!</h1>

      <p class="text-base-content/60">
        รถยนต์ทะเบียน
        <span class="badge badge-outline font-bold">{{ car.license_plate }}</span>
      </p>

      <p class="text-base-content/50 text-sm">ความคิดเห็นของคุณถูกบันทึกเรียบร้อยแล้ว</p>

      <div class="divider my-0"></div>
      <p class="text-base-content/40 text-xs">คุณสามารถปิดหน้านี้ได้แล้ว</p>

    </div>
  </div>

  <link rel="stylesheet"
    href="{{ url_for('static', filename='node_modules/@phosphor-icons/web/src/regular/style.css') }}">

</html>

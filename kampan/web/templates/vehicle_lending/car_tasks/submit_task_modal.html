{% set modal_header = "บันทึกการกลับ / กรอกไมล์" %}
{% import '/base/html-renderer.html' as renderer %}

<dialog class="modal modal-open" id="{{ modal_id }}">
  <div class="modal-box w-11/12 max-w-lg">
    <h3 class="text-lg font-bold">{{ modal_header }}</h3>
    <form method="post"
      action="{{ url_for('vehicle_lending.car_tasks.submit_task_modal', car_application_id=car_application.id, organization_id=organization.id) }}">
      {{ form.hidden_tag() }}
      {{ renderer.render_field(form.last_mileage)}}
      <div class="modal-action flex-col sm:flex-row gap-2 justify-end w-full">
        <button type="button" class="btn w-full sm:w-auto"
          onclick="document.getElementById('{{ modal_id }}').classList.remove('modal-open')">
          ปิด
        </button>
        <button type="submit" class="btn btn-primary w-full sm:w-auto m-0">ยืนยัน</button>
      </div>
    </form>
  </div>
</dialog>

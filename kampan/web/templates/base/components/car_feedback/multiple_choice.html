{% macro render_multiple_choice(q, index) %}
<div class="mt-4 flex flex-col gap-2">
	{% for choice in q.choice_list %}
	<label class="flex items-start gap-4 cursor-pointer hover:bg-base-200/50 p-3 rounded-lg transition-colors group">
		<input type="checkbox" name="answer_{{ q.question_id }}[]" value="{{ choice }}"
			class="checkbox checkbox-primary mt-0.5 border-2" />
		<span class="font-medium text-[15px] group-hover:text-primary transition-colors">{{ choice }}</span>
	</label>
	{% endfor %}
	{% if q.is_required %}
	<input type="hidden" name="answer_required_{{ q.question_id }}" value="true" />
	<span class="text-xs text-error hidden" id="error_{{ q.question_id }}">กรุณาเลือกอย่างน้อย 1 รายการ</span>
	{% endif %}
</div>
{% endmacro %}
